apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lab-ingress
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/lab/infrastructure/ingress
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 10m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lab-data
  namespace: flux-system
spec:
  interval: 10m
  path: ./clusters/lab/infrastructure/data
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 15m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lab-observability
  namespace: flux-system
spec:
  dependsOn:
    - name: lab-ingress
  interval: 10m
  path: ./clusters/lab/infrastructure/observability
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 20m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lab-alert-rules
  namespace: flux-system
spec:
  dependsOn:
    - name: lab-observability
  interval: 10m
  path: ./clusters/lab/infrastructure/observability/rules
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 5m
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: lab-apps
  namespace: flux-system
spec:
  dependsOn:
    - name: lab-ingress
    - name: lab-data
    - name: lab-observability
  interval: 10m
  path: ./clusters/lab/apps
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  timeout: 20m
  wait: true
