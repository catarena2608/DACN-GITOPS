apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: ingress-system
spec:
  interval: 5m
  timeout: 10m
  chart:
    spec:
      chart: traefik
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    ingressClass:
      enabled: true
      isDefaultClass: false
    providers:
      kubernetesIngress:
        enabled: true
        ingressClass: traefik
        publishedService:
          enabled: true
    service:
      type: LoadBalancer
