apiVersion: v1
kind: Secret
metadata:
  name: dacn-auth-staging-secrets
  namespace: dacn-staging
type: Opaque
stringData:
  URI: mongodb://mongodb.data.svc.cluster.local:27017/auth_db
  JWT_SECRET: replace-with-staging-access-token-secret
  JWT_REFRESH_SECRET: replace-with-staging-refresh-token-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: dacn-product-staging-secrets
  namespace: dacn-staging
type: Opaque
stringData:
  URI: mongodb://mongodb.data.svc.cluster.local:27017/product_db
  RABBITMQ_URL: amqp://dacn:dacn-lab-password@rabbitmq.data.svc.cluster.local:5672
---
apiVersion: v1
kind: Secret
metadata:
  name: dacn-order-staging-secrets
  namespace: dacn-staging
type: Opaque
stringData:
  URI: mongodb://mongodb.data.svc.cluster.local:27017/order_db
  RABBITMQ_URL: amqp://dacn:dacn-lab-password@rabbitmq.data.svc.cluster.local:5672
---
apiVersion: v1
kind: Secret
metadata:
  name: dacn-gateway-staging-secrets
  namespace: dacn-staging
type: Opaque
stringData:
  JWT_SECRET: replace-with-staging-access-token-secret
