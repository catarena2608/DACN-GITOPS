apiVersion: v1
kind: Secret
metadata:
  name: dacn-auth-prod-secrets
  namespace: dacn-prod
type: Opaque
stringData:
  URI: mongodb://mongodb.data.svc.cluster.local:27017/auth_prod_db
  JWT_SECRET: replace-with-prod-access-token-secret
  JWT_REFRESH_SECRET: replace-with-prod-refresh-token-secret
---
apiVersion: v1
kind: Secret
metadata:
  name: dacn-product-prod-secrets
  namespace: dacn-prod
type: Opaque
stringData:
  URI: mongodb://mongodb.data.svc.cluster.local:27017/product_prod_db
  RABBITMQ_URL: amqp://dacn:dacn-lab-password@rabbitmq.data.svc.cluster.local:5672
---
apiVersion: v1
kind: Secret
metadata:
  name: dacn-order-prod-secrets
  namespace: dacn-prod
type: Opaque
stringData:
  URI: mongodb://mongodb.data.svc.cluster.local:27017/order_prod_db
  RABBITMQ_URL: amqp://dacn:dacn-lab-password@rabbitmq.data.svc.cluster.local:5672
---
apiVersion: v1
kind: Secret
metadata:
  name: dacn-gateway-prod-secrets
  namespace: dacn-prod
type: Opaque
stringData:
  JWT_SECRET: replace-with-prod-access-token-secret
